<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR 적립 시스템</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f7fa;
        }
        .container {
            text-align: center;
            padding: 30px;
            border-radius: 15px;
            background: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 80%;
        }
        h1 { font-size: 24px; margin-bottom: 20px; }
        .status-msg { font-size: 20px; font-weight: bold; margin-bottom: 10px; }
        .sub-msg { font-size: 14px; color: #666; }
        
        /* 상태별 스타일 */
        .success { color: #2ecc71; }
        .wait { color: #e74c3c; }
    </style>
</head>
<body>

<div class="container">
    <div id="result-icon" style="font-size: 50px; margin-bottom: 10px;">🔄</div>
    <div id="status-text" class="status-msg">처리 중...</div>
    <div id="sub-text" class="sub-msg">잠시만 기다려주세요.</div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const statusText = document.getElementById("status-text");
        const subText = document.getElementById("sub-text");
        const resultIcon = document.getElementById("result-icon");

        const now = Date.now(); // 현재 시간 (밀리초)
        const lastScan = localStorage.getItem("last_scan_time");
        const oneMinute = 60 * 1000; // 1분을 밀리초로 환산

        if (lastScan) {
            const timeDiff = now - parseInt(lastScan);

            if (timeDiff < oneMinute) {
                // 1분 이내에 다시 찍은 경우
                const remainingSec = Math.ceil((oneMinute - timeDiff) / 1000);
                resultIcon.textContent = "⏱️";
                statusText.textContent = "조금 더 기다려주세요";
                statusText.className = "status-msg wait";
                subText.textContent = `${remainingSec}초 후에 다시 시도할 수 있습니다.`;
            } else {
                // 1분이 지나고 다시 찍은 경우
                resultIcon.textContent = "✅";
                statusText.textContent = "적립 완료";
                statusText.className = "status-msg success";
                subText.textContent = "포인트가 정상적으로 적립되었습니다.";
                localStorage.setItem("last_scan_time", now); // 스캔 시간 갱신
            }
        } else {
            // 처음 찍은 경우
            resultIcon.textContent = "✅";
            statusText.textContent = "적립 완료";
            statusText.className = "status-msg success";
            subText.textContent = "첫 적립이 정상적으로 완료되었습니다.";
            localStorage.setItem("last_scan_time", now); // 현재 시간 저장
        }
    });
</script>
</body>
</html>
